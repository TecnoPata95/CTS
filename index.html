<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Calculadora CTS Perú</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
  <link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css"/>
</head>
<body class="bg-gradient-to-r from-black via-gray-900 to-orange-600 text-white min-h-screen flex items-center justify-center">
  <div class="container p-6 rounded shadow-lg bg-white text-black max-w-lg animate__animated animate__fadeIn" data-aos="zoom-in">
    <h1 class="text-center text-3xl font-bold text-orange-600 mb-4">Calculadora CTS Perú</h1>
    <p class="text-sm text-gray-600 mb-4 text-center">Ingresa tus datos según tu boleta de pago. La gratificación corresponde a julio/diciembre y la asignación familiar solo aplica si tienes hijos menores.</p>
    
    <form id="ctsForm" class="space-y-3">
      <div>
        <label class="form-label">Sueldo mensual (S/):</label>
        <input type="number" id="sueldo" class="form-control" required>
      </div>
      <div class="form-check mt-2">
        <input class="form-check-input" type="checkbox" id="checkAsignacion">
        <label class="form-check-label">¿Recibes asignación familiar?</label>
      </div>
      <div id="asignacionDiv" class="hidden">
        <label class="form-label">Asignación familiar (S/):</label>
        <input type="number" id="asignacion" class="form-control" value="0">
      </div>
      <div>
        <label class="form-label">Gratificación recibida (S/):</label>
        <input type="number" id="grati" class="form-control" value="0">
      </div>
      <div>
        <label class="form-label">Meses trabajados en el semestre:</label>
        <input type="number" id="meses" class="form-control" max="6" required>
      </div>
      <div>
        <label class="form-label">Días trabajados adicionales:</label>
        <input type="number" id="dias" class="form-control" value="0">
      </div>
      <button type="submit" class="btn btn-warning w-100 mt-3 hover:scale-105 transition">Calcular CTS</button>
    </form>
    <h2 id="resultado" class="text-center mt-4 text-xl font-semibold text-green-600 animate__animated animate__fadeInUp"></h2>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script>
    AOS.init();

    // Mostrar/ocultar asignación familiar
    document.getElementById("checkAsignacion").addEventListener("change", function(){
      document.getElementById("asignacionDiv").classList.toggle("hidden", !this.checked);
    });

    // Lógica CTS
    document.getElementById("ctsForm").addEventListener("submit", function(e){
      e.preventDefault();
      let sueldo = parseFloat(document.getElementById("sueldo").value);
      let asignacion = document.getElementById("checkAsignacion").checked ? parseFloat(document.getElementById("asignacion").value) : 0;
      let grati = parseFloat(document.getElementById("grati").value);
      let meses = parseInt(document.getElementById("meses").value);
      let dias = parseInt(document.getElementById("dias").value);

      let remuneracion = sueldo + asignacion + (grati/6);
      let cts = (remuneracion/6) * meses + (remuneracion/360) * dias;

      document.getElementById("resultado").innerText = "Tu CTS es: S/ " + cts.toFixed(2);
    });
  </script>
</body>
</html>
