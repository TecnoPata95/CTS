<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Calculadora CTS Perú</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Animate.css -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
  <!-- AOS -->
  <link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css"/>
  <!-- Intro.js CSS -->
  <link rel="stylesheet" href="https://unpkg.com/intro.js/minified/introjs.min.css">
</head>
<body class="bg-gradient-to-r from-black via-gray-900 to-orange-600 text-white min-h-screen flex items-center justify-center">
  <div class="container p-6 rounded shadow-lg bg-white text-black max-w-lg animate__animated animate__fadeIn" data-aos="zoom-in">
    <h1 class="text-center text-3xl font-bold text-orange-600 mb-4">Calculadora CTS Perú</h1>
    <p class="text-sm text-gray-600 mb-4 text-center">Ingresa tus datos según tu boleta de pago. La gratificación corresponde a julio/diciembre y la asignación familiar solo aplica si tienes hijos menores.</p>
    
    <form id="ctsForm" class="space-y-3">
      <div data-step="1" data-intro="Ingresa tu sueldo mensual según tu boleta de pago. Este es el valor base para calcular tu CTS.">
        <label class="form-label">Sueldo mensual (S/):</label>
        <input type="number" id="sueldo" class="form-control" required>
      </div>

      <div class="form-check mt-2" data-step="2" data-intro="Marca esta casilla si recibes asignación familiar. Solo aplica si tienes hijos menores.">
        <input class="form-check-input" type="checkbox" id="checkAsignacion">
        <label class="form-check-label">¿Recibes asignación familiar?</label>
      </div>

      <div id="asignacionDiv" class="hidden" data-step="3" data-intro="Si marcaste la casilla anterior, ingresa el monto de asignación familiar que aparece en tu boleta.">
        <label class="form-label">Asignación familiar (S/):</label>
        <input type="number" id="asignacion" class="form-control" value="0">
      </div>

      <div data-step="4" data-intro="Ingresa el monto de la gratificación recibida en julio o diciembre. La ley exige sumar 1/6 de este valor al cálculo.">
        <label class="form-label">Gratificación recibida (S/):</label>
        <input type="number" id="grati" class="form-control" value="0">
      </div>

      <div data-step="5" data-intro="Indica cuántos meses trabajaste en el semestre (máximo 6).">
        <label class="form-label">Meses trabajados en el semestre:</label>
        <input type="number" id="meses" class="form-control" max="6" required>
      </div>

      <div data-step="6" data-intro="Si trabajaste días adicionales además de los meses completos, ingrésalos aquí.">
        <label class="form-label">Días trabajados adicionales:</label>
        <input type="number" id="dias" class="form-control" value="0">
      </div>

      <button type="submit" class="btn btn-warning w-100 mt-3 hover:scale-105 transition" data-step="7" data-intro="Haz clic aquí para calcular tu CTS automáticamente.">Calcular CTS</button>
    </form>

    <h2 id="resultado" class="text-center mt-4 text-xl font-semibold text-green-600 animate__animated animate__fadeInUp" data-step="8" data-intro="Aquí verás el resultado final de tu CTS calculado."></h2>
  </div>

  <!-- Botón flotante para relanzar el tour -->
  <button onclick="iniciarTour()" class="fixed bottom-5 right-5 bg-orange-600 text-white px-4 py-2 rounded-full shadow-lg hover:bg-orange-500 transition">
    ¿Cómo usar?
  </button>

  <!-- Librerías JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script src="https://unpkg.com/intro.js/minified/intro.min.js"></script>

  <script>
    AOS.init();

    // Mostrar/ocultar asignación familiar
    document.getElementById("checkAsignacion").addEventListener("change", function(){
      document.getElementById("asignacionDiv").classList.toggle("hidden", !this.checked);
    });

    // Lógica CTS
    document.getElementById("ctsForm").addEventListener("submit", function(e){
      e.preventDefault();
      let sueldo = parseFloat(document.getElementById("sueldo").value);
      let asignacion = document.getElementById("checkAsignacion").checked ? parseFloat(document.getElementById("asignacion").value) : 0;
      let grati = parseFloat(document.getElementById("grati").value);
      let meses = parseInt(document.getElementById("meses").value);
      let dias = parseInt(document.getElementById("dias").value);

      let remuneracion = sueldo + asignacion + (grati/6);
      let cts = (remuneracion/6) * meses + (remuneracion/360) * dias;

      document.getElementById("resultado").innerText = "Tu CTS es: S/ " + cts.toFixed(2);
    });

    // Inicializar Intro.js
    function iniciarTour() {
      introJs().setOptions({
        nextLabel: 'Siguiente',
        prevLabel: 'Atrás',
        doneLabel: 'Entendido',
        skipLabel: 'Saltar',
        tooltipClass: 'customTooltip',
        showProgress: true,
        showBullets: false
      }).start();
    }

    // Iniciar tour automáticamente al cargar
    window.onload = function() {
      setTimeout(() => {
        iniciarTour();
      }, 1000);
    };
  </script>
</body>
</html>
