<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Calculadora CTS Perú</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <h1>Calculadora CTS Perú</h1>
  <form id="ctsForm">
    <label>Sueldo mensual (S/):</label>
    <input type="number" id="sueldo" required>
    
    <label>Asignación familiar (S/):</label>
    <input type="number" id="asignacion" value="0">
    
    <label>Gratificación recibida (S/):</label>
    <input type="number" id="grati" value="0">
    
    <label>Meses trabajados en el semestre:</label>
    <input type="number" id="meses" max="6" required>
    
    <label>Días trabajados adicionales:</label>
    <input type="number" id="dias" value="0">
    
    <button type="submit">Calcular CTS</button>
  </form>
  <h2 id="resultado"></h2>
  <script src="script.js"></script>
</body>
</html>
